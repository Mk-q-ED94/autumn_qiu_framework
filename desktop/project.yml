name: AutumnDesktop
options:
  bundleIdPrefix: com.autumn
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "14.0"
  groupSortPosition: top
  developmentLanguage: zh-Hans

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    CLANG_WARN_DOCUMENTATION_COMMENTS: NO

targets:
  AutumnDesktop:
    type: application
    platform: macOS
    sources:
      - path: AutumnApp
        excludes:
          - "Resources/Info.plist"
          - "Resources/Assets.xcassets"
          - "Resources/AutumnDesktop.entitlements"
          - "Resources/zh-Hans.lproj"
          - "Resources/en.lproj"
      - path: AutumnApp/Resources/Assets.xcassets
        buildPhase: resources
      - path: AutumnApp/Resources/zh-Hans.lproj
        buildPhase: resources
      - path: AutumnApp/Resources/en.lproj
        buildPhase: resources
    info:
      path: AutumnApp/Resources/Info.plist
      properties:
        AutumnRepositoryRoot: "$(SRCROOT)/.."
        CFBundleDisplayName: Autumn
        CFBundleShortVersionString: "0.3.4"
        CFBundleVersion: "1"
        NSPrincipalClass: NSApplication
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.autumn.desktop
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_DEBUG_DYLIB: NO
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: AutumnApp/Resources/AutumnDesktop.entitlements
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
