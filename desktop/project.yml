name: AutumnDesktop
options:
  bundleIdPrefix: com.autumn
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    CLANG_WARN_DOCUMENTATION_COMMENTS: NO

targets:
  AutumnDesktop:
    type: application
    platform: iOS
    sources:
      - path: AutumnApp
        excludes:
          - "Resources/Info.plist"
          - "Resources/AutumnDesktop.entitlements"
    info:
      path: AutumnApp/Resources/Info.plist
      properties:
        CFBundleDisplayName: Autumn
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: false
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSLocalNetworkUsageDescription: Autumn 需要本地网络权限连接你本机运行的 Autumn 服务器。
    entitlements:
      path: AutumnApp/Resources/AutumnDesktop.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.autumn.desktop
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator macosx"
        SUPPORTS_MACCATALYST: NO
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_HARDENED_RUNTIME: YES
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
